<!DOCTYPE html>
<html lang="ru">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ТИТАНОВЫЕ ГРУЗОВИКИ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="main.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="left-header">

            <img src="photo10.jpg" class="avatar">

            <div class="logo-block">

                <img src="photo11.jpg" class="logo-image">

                <div class="logo-text">
                    ТИТАНОВЫЕ ГРУЗОВИКИ
                </div>

            </div>

        </div>

        <!-- MENU -->

        <nav>
            <a href="video.html">Видео</a>
            <a href="photo.html">Фото</a>
            <a href="walk.html">Прогулочки</a>
        </nav>

    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay"></div>

        <h1>
            Чем гуще лес,<br>
            тем шкибиди доп доп ес ес…
        </h1>

    </section>

    <!-- SEARCH -->

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Поиск по мемам...">

    </section>

    <!-- UPLOAD -->

    <section class="upload-section">

        <label class="upload-button">

            Загрузить мемы

            <input type="file" multiple hidden>

        </label>

    </section>

    <!-- GALLERY -->

    <section class="gallery" id="gallery">

        <img src="photo1.jpg" alt="photo1">
        <img src="photo2.jpg" alt="photo2">
        <img src="photo3.jpg" alt="photo3">
        <img src="photo4.jpg" alt="photo4">
        <img src="photo5.jpg" alt="photo5">
        <img src="photo6.jpg" alt="photo6">
        <img src="photo7.jpg" alt="photo7">
        <img src="photo8.jpg" alt="photo8">
        <img src="photo9.jpg" alt="photo9">

    </section>

    <script src="script.js"></script>
